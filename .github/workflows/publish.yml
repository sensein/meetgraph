# Publish the `meetgraph` package to PyPI when a version tag is pushed.
#
# Release flow:  bump `version` in pyproject.toml → commit → tag → push the tag:
#     git tag v0.2.0 && git push origin v0.2.0
#
# ONE-TIME SETUP — API token (this is what the workflow below uses):
#   1. https://pypi.org/manage/account/token/  → create a token
#        (scope it to the `meetgraph` project once the project exists; use an
#         account-wide token for the very first upload, then narrow it).
#   2. GitHub repo → Settings → Secrets and variables → Actions → New repository
#        secret, named exactly:  PYPI_API_TOKEN   (value = the `pypi-…` token).
#   The publish step reads it as `password: ${{ secrets.PYPI_API_TOKEN }}` below.
#
# ALTERNATIVE — Trusted Publishing (OIDC, no stored token): delete the `password:`
#   line, add `id-token: write` under the job's `permissions:`, keep `environment: pypi`,
#   and register the publisher on PyPI (project → Publishing → add pending publisher
#   with this repo + workflow name `publish.yml` + environment `pypi`).

name: Release

on:
  push:
    tags:
      # GitHub Actions tag filters are GLOB, not regex: `.` is a literal here —
      # no backslash. A `\.` pattern matches a literal backslash and silently
      # fails to fire on a real tag push. Matches v0.1.0, v1.2.3-rc.1, v2.0.0-beta.1.
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # (Optional) add `environment: pypi` here to gate releases behind manual
    # approval — works with a repository secret too.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: |
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}   # the API token lives here (repo secret)
