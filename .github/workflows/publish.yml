# Publish the `meetgraph` package to PyPI when a version tag is pushed.
#
# Release flow:  bump `version` in pyproject.toml → commit → tag → push the tag:
#     git tag v0.2.0 && git push origin v0.2.0
#
# AUTH — this workflow uses an API token (PYPI_API_TOKEN repo secret), wired in
# the publish step below. Create it at https://pypi.org/manage/account/token/
# (account-wide for the FIRST upload, then narrow to the `meetgraph` project).
#
# ALTERNATIVE — Trusted Publishing (OIDC, no stored token). Register a publisher
# on PyPI (project → Publishing; use "pending publisher" before the project's
# first release) whose fields EXACTLY match this repo's OIDC claims:
#     • Owner:            sensein
#     • Repository name:  meetgraph
#     • Workflow name:    publish.yml      (this file's name)
#     • Environment name: pypi             (must equal the job's `environment:`)
# Then add `id-token: write` under the job permissions, set `environment: pypi`,
# and remove the `password:` line. A mismatch in ANY field above is what causes
# "invalid-publisher: ... no corresponding publisher".

name: Release

on:
  push:
    tags:
      # GitHub Actions tag filters are GLOB, not regex: `.` is a literal here —
      # no backslash. A `\.` pattern matches a literal backslash and silently
      # fails to fire on a real tag push. Matches v0.1.0, v1.2.3-rc.1, v2.0.0-beta.1.
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: |
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}   # API token (repo secret); no OIDC needed
          skip-existing: true
